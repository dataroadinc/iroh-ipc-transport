name: Auto Version Bump & Publish

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  bump:
    uses: dataroadinc/github-actions/.github/workflows/cargo-auto-version-bump.yml@main
    with:
      crate-name: iroh-ipc-transport
      match-mode: first-line-prefix
    secrets: inherit
